<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Reinforcement learning loop</title>
  <desc id="desc">Original diagram showing agent, environment, action, state, and reward feedback loop.</desc>
  <rect width="960" height="420" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="48" y="62" font-size="30" font-weight="700">Reinforcement Learning：奖励驱动策略</text>
    <text x="48" y="96" font-size="16" fill="#475569">智能体在环境里行动，收到奖励或惩罚，再调整下一步策略。</text>
    <rect x="120" y="165" width="220" height="120" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="178" y="222" font-size="25" font-weight="700">Agent</text>
    <text x="160" y="252" font-size="15">选择动作</text>
    <rect x="620" y="165" width="220" height="120" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="658" y="222" font-size="25" font-weight="700">Environment</text>
    <text x="677" y="252" font-size="15">返回状态与奖励</text>
    <path d="M350 205 H595" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="445" y="190" font-size="16" fill="#334155">Action</text>
    <path d="M610 270 C500 350 355 345 245 292" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="405" y="350" font-size="16" fill="#334155">Reward + State</text>
    <text x="170" y="330" font-size="15" fill="#475569">奖励函数设计错，学到的策略也可能错。</text>
  </g>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker></defs>
</svg>
