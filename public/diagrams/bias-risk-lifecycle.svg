<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0B1020"/>
  <text x="480" y="70" text-anchor="middle" fill="#F8FAFC" font-size="34" font-family="Arial, sans-serif" font-weight="700">偏差不是只出现在模型里，而是贯穿 AI 生命周期</text>
  <text x="480" y="108" text-anchor="middle" fill="#94A3B8" font-size="18" font-family="Arial, sans-serif">数据、训练目标、评估方式和上线流程都会把系统性倾向放大或缓和</text>

  <rect x="78" y="172" width="170" height="190" rx="22" fill="#1D4ED8"/>
  <text x="163" y="225" text-anchor="middle" fill="#EFF6FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">数据</text>
  <text x="163" y="268" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Arial, sans-serif">谁被代表</text>
  <text x="163" y="302" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Arial, sans-serif">谁被遗漏</text>
  <text x="163" y="336" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Arial, sans-serif">标签是否带偏</text>

  <rect x="286" y="172" width="170" height="190" rx="22" fill="#7C3AED"/>
  <text x="371" y="225" text-anchor="middle" fill="#F5F3FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">目标</text>
  <text x="371" y="268" text-anchor="middle" fill="#EDE9FE" font-size="17" font-family="Arial, sans-serif">优化什么指标</text>
  <text x="371" y="302" text-anchor="middle" fill="#EDE9FE" font-size="17" font-family="Arial, sans-serif">代价怎么算</text>
  <text x="371" y="336" text-anchor="middle" fill="#EDE9FE" font-size="17" font-family="Arial, sans-serif">公平性如何定义</text>

  <rect x="504" y="172" width="170" height="190" rx="22" fill="#0F766E"/>
  <text x="589" y="225" text-anchor="middle" fill="#ECFDF5" font-size="28" font-family="Arial, sans-serif" font-weight="700">评估</text>
  <text x="589" y="268" text-anchor="middle" fill="#CCFBF1" font-size="17" font-family="Arial, sans-serif">只看平均分吗</text>
  <text x="589" y="302" text-anchor="middle" fill="#CCFBF1" font-size="17" font-family="Arial, sans-serif">分群是否检查</text>
  <text x="589" y="336" text-anchor="middle" fill="#CCFBF1" font-size="17" font-family="Arial, sans-serif">场景是否真实</text>

  <rect x="712" y="172" width="170" height="190" rx="22" fill="#B45309"/>
  <text x="797" y="225" text-anchor="middle" fill="#FFF7ED" font-size="28" font-family="Arial, sans-serif" font-weight="700">部署</text>
  <text x="797" y="268" text-anchor="middle" fill="#FED7AA" font-size="17" font-family="Arial, sans-serif">谁会受影响</text>
  <text x="797" y="302" text-anchor="middle" fill="#FED7AA" font-size="17" font-family="Arial, sans-serif">能否申诉</text>
  <text x="797" y="336" text-anchor="middle" fill="#FED7AA" font-size="17" font-family="Arial, sans-serif">是否持续监测</text>

  <path d="M248 267H286" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>
  <path d="M456 267H504" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>
  <path d="M674 267H712" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>

  <rect x="145" y="412" width="670" height="74" rx="18" fill="#111827" stroke="#334155"/>
  <text x="480" y="456" text-anchor="middle" fill="#E2E8F0" font-size="22" font-family="Arial, sans-serif">治理偏差的关键：别只问模型有没有偏，要问整个流程在哪里放大了偏差</text>
</svg>
