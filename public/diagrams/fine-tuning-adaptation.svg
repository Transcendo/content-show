<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Fine-tuning adaptation flow</title>
  <desc id="desc">A foundation model is adapted with task data into a fine-tuned model, while RAG and prompting remain alternative layers.</desc>
  <rect width="960" height="420" rx="28" fill="#0f172a"/>
  <text x="48" y="64" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Fine-tuning adapts behavior</text>
  <text x="48" y="96" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Use training data to change model behavior; use RAG for fresh knowledge.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="62" y="154" width="202" height="112" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="92" y="196" fill="#f8fafc" font-size="22" font-weight="700">基础模型</text>
    <text x="92" y="226" fill="#cbd5e1" font-size="15">General capability</text>

    <rect x="380" y="96" width="202" height="92" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="410" y="136" fill="#f8fafc" font-size="21" font-weight="700">训练样本</text>
    <text x="410" y="162" fill="#bfdbfe" font-size="14">task, style, format</text>

    <rect x="380" y="234" width="202" height="92" rx="18" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
    <text x="410" y="274" fill="#f8fafc" font-size="21" font-weight="700">PEFT / LoRA</text>
    <text x="410" y="300" fill="#c7d2fe" font-size="14">small adapters</text>

    <rect x="696" y="154" width="202" height="112" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
    <text x="726" y="196" fill="#f8fafc" font-size="22" font-weight="700">微调模型</text>
    <text x="726" y="226" fill="#bbf7d0" font-size="15">Adapted behavior</text>

    <g stroke="#64748b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M282 210 H358"/>
      <path d="M350 198 L370 210 L350 222"/>
      <path d="M600 142 C648 158 664 176 680 198"/>
      <path d="M600 280 C648 262 664 244 680 222"/>
    </g>

    <rect x="176" y="330" width="608" height="44" rx="14" fill="#111827" stroke="#334155"/>
    <text x="210" y="358" fill="#cbd5e1" font-size="16">Prompting and RAG can still wrap the fine-tuned model at inference time.</text>
  </g>
</svg>
