<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Vector database retrieval flow</title>
  <desc id="desc">A diagram showing documents and user questions converted into embeddings, searched in a vector database, then used by RAG or semantic search.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .accent { fill: #eef2ff; stroke: #818cf8; }
      .store { fill: #f0fdf4; stroke: #22c55e; }
      .warn { fill: #fff7ed; stroke: #fb923c; }
      .title { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 650 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
      .text { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="960" height="520" fill="url(#bg)"/>
  <text x="48" y="58" class="title">向量数据库在 RAG 里的位置</text>
  <text x="48" y="86" class="text">它负责“按相似度找资料”，不是直接生成答案，也不替代提示设计或微调。</text>

  <rect x="54" y="138" width="178" height="104" class="box"/>
  <text x="86" y="177" class="label">资料片段</text>
  <text x="82" y="205" class="text">文档、FAQ、网页</text>
  <text x="92" y="226" class="tiny">先切分并保留来源</text>

  <rect x="298" y="138" width="178" height="104" class="box accent"/>
  <text x="337" y="177" class="label">Embedding</text>
  <text x="332" y="205" class="text">把内容转成向量</text>
  <text x="329" y="226" class="tiny">便于计算相似度</text>

  <rect x="542" y="116" width="230" height="148" class="box store"/>
  <text x="604" y="157" class="label">向量数据库</text>
  <text x="588" y="189" class="text">存储向量 + 元数据</text>
  <text x="588" y="214" class="text">建立索引，加速近邻检索</text>
  <text x="588" y="239" class="tiny">返回相关片段，不判断真伪</text>

  <rect x="54" y="330" width="178" height="104" class="box"/>
  <text x="86" y="370" class="label">用户问题</text>
  <text x="78" y="398" class="text">也转成查询向量</text>

  <rect x="542" y="330" width="230" height="104" class="box warn"/>
  <text x="598" y="370" class="label">RAG / 语义搜索</text>
  <text x="585" y="398" class="text">把检索片段交给模型或用户</text>
  <text x="604" y="419" class="tiny">仍需提示、引用与校验</text>

  <path d="M232 190 H292" class="arrow"/>
  <path d="M476 190 H536" class="arrow"/>
  <path d="M232 382 C348 382 404 383 536 382" class="arrow"/>
  <path d="M657 264 V323" class="arrow"/>

  <circle cx="825" cy="144" r="7" fill="#22c55e"/>
  <circle cx="858" cy="172" r="7" fill="#22c55e"/>
  <circle cx="807" cy="204" r="7" fill="#22c55e"/>
  <circle cx="875" cy="231" r="7" fill="#22c55e"/>
  <path d="M825 144 L858 172 L807 204 L875 231" stroke="#86efac" stroke-width="2" fill="none"/>
  <text x="792" y="282" class="tiny">相似向量会被排在更靠前的位置</text>
</svg>
