<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Training data as world window</title>
  <desc id="desc">Original diagram showing training data as a filtered window through which a model sees the world.</desc>
  <rect width="960" height="420" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="48" y="62" font-size="30" font-weight="700">Training Data：模型看世界的窗口</text>
    <text x="48" y="96" font-size="16" fill="#475569">数据决定模型看见什么、忽略什么，也决定它可能学到哪些偏差。</text>
    <circle cx="220" cy="235" r="105" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="168" y="230" font-size="24" font-weight="700">真实世界</text>
    <text x="158" y="260" font-size="15">复杂、多样、变化</text>
    <rect x="390" y="145" width="190" height="180" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
    <text x="426" y="210" font-size="23" font-weight="700">训练数据</text>
    <text x="426" y="242" font-size="15">采样、清洗、标注</text>
    <text x="426" y="270" font-size="15" fill="#c2410c">也可能重复/污染/偏差</text>
    <path d="M330 235 H380" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M590 235 H690" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="705" y="165" width="160" height="140" rx="22" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="747" y="225" font-size="24" font-weight="700">模型</text>
    <text x="733" y="255" font-size="15">只从窗口学习</text>
  </g>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker></defs>
</svg>
