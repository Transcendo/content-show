<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">AI 推理流程示意图</title>
  <desc id="desc">用户输入经过分词和上下文处理，调用已训练好的模型参数，输出预测或回答，同时受到延迟、吞吐和成本约束。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f3b6d" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5277c7"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bg)"/>
  <text x="480" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#16213e">推理：训练好的模型正式上岗</text>
  <text x="480" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#53627d">不是重新学习，而是用已学到的参数处理新输入</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="58" y="148" width="155" height="112" rx="22" fill="#ffffff"/>
    <text x="135" y="187" text-anchor="middle" font-size="19" font-weight="700" fill="#18315f">新输入</text>
    <text x="135" y="216" text-anchor="middle" font-size="14" fill="#53627d">问题、图片</text>
    <text x="135" y="238" text-anchor="middle" font-size="14" fill="#53627d">或用户请求</text>

    <rect x="284" y="148" width="155" height="112" rx="22" fill="#ffffff"/>
    <text x="362" y="187" text-anchor="middle" font-size="19" font-weight="700" fill="#18315f">输入处理</text>
    <text x="362" y="216" text-anchor="middle" font-size="14" fill="#53627d">分词、上下文</text>
    <text x="362" y="238" text-anchor="middle" font-size="14" fill="#53627d">格式化</text>

    <rect x="511" y="132" width="172" height="144" rx="24" fill="#ffffff"/>
    <text x="597" y="176" text-anchor="middle" font-size="19" font-weight="700" fill="#18315f">模型计算</text>
    <text x="597" y="205" text-anchor="middle" font-size="14" fill="#53627d">调用已训练参数</text>
    <text x="597" y="227" text-anchor="middle" font-size="14" fill="#53627d">做前向计算</text>
    <text x="597" y="249" text-anchor="middle" font-size="14" fill="#53627d">生成预测分布</text>

    <rect x="750" y="148" width="155" height="112" rx="22" fill="#ffffff"/>
    <text x="828" y="187" text-anchor="middle" font-size="19" font-weight="700" fill="#18315f">输出</text>
    <text x="828" y="216" text-anchor="middle" font-size="14" fill="#53627d">回答、分类</text>
    <text x="828" y="238" text-anchor="middle" font-size="14" fill="#53627d">或推荐结果</text>
  </g>

  <g stroke="#5277c7" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 216 204 L 270 204"/>
    <path d="M 442 204 L 498 204"/>
    <path d="M 686 204 L 737 204"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="148" y="318" width="664" height="54" rx="18" fill="#dfeaff"/>
    <text x="480" y="341" text-anchor="middle" font-size="15" font-weight="700" fill="#18315f">推理工程关注：延迟、吞吐、成本、上下文长度、稳定性</text>
    <text x="480" y="363" text-anchor="middle" font-size="13" fill="#53627d">训练决定参数从哪里来；推理决定用户每一次调用能否又快、又稳、又可负担。</text>
  </g>
</svg>
