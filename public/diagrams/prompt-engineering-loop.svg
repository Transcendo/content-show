<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Prompt engineering loop</title>
  <desc id="desc">Prompt engineering moves from goal, context, examples, output format, evaluation, and iteration.</desc>
  <rect width="960" height="420" rx="28" fill="#0f172a"/>
  <text x="48" y="64" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Prompt Engineering Loop</text>
  <text x="48" y="96" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Good prompts are task specs plus evaluation, not magic words.</text>

  <g font-family="Inter, Arial, sans-serif">
    <circle cx="480" cy="220" r="102" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="428" y="214" fill="#f8fafc" font-size="22" font-weight="700">Model</text>
    <text x="390" y="244" fill="#94a3b8" font-size="15">LLM response under constraints</text>

    <g fill="#1e293b" stroke="#38bdf8" stroke-width="2">
      <rect x="68" y="160" width="150" height="74" rx="16"/>
      <rect x="288" y="66" width="150" height="74" rx="16"/>
      <rect x="522" y="66" width="150" height="74" rx="16"/>
      <rect x="742" y="160" width="150" height="74" rx="16"/>
      <rect x="522" y="300" width="150" height="74" rx="16"/>
      <rect x="288" y="300" width="150" height="74" rx="16"/>
    </g>

    <g fill="#f8fafc" font-size="18" font-weight="700">
      <text x="108" y="204">目标</text>
      <text x="328" y="110">上下文</text>
      <text x="562" y="110">示例</text>
      <text x="774" y="204">输出格式</text>
      <text x="562" y="344">评估</text>
      <text x="328" y="344">迭代</text>
    </g>
    <g fill="#94a3b8" font-size="13">
      <text x="96" y="224">What task?</text>
      <text x="314" y="130">What evidence?</text>
      <text x="550" y="130">What good looks like?</text>
      <text x="770" y="224">How to return?</text>
      <text x="552" y="364">Did it pass?</text>
      <text x="318" y="364">Fix failures</text>
    </g>

    <g stroke="#64748b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M220 188 C282 154 330 134 382 124"/>
      <path d="M438 104 H520"/>
      <path d="M672 124 C724 134 772 154 740 188"/>
      <path d="M742 226 C706 272 666 300 622 318"/>
      <path d="M522 338 H438"/>
      <path d="M338 300 C274 266 232 236 218 208"/>
    </g>
  </g>
</svg>
