<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Tokenization flow diagram</title>
  <desc id="desc">A sentence is split into model tokens and token ids before entering the model context.</desc>
  <rect width="960" height="420" rx="28" fill="#0f172a"/>
  <text x="48" y="64" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Text → Tokens → Token IDs</text>
  <text x="48" y="96" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Models count and process text after tokenizer splitting.</text>

  <rect x="48" y="140" width="260" height="120" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="76" y="186" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">原始文本</text>
  <text x="76" y="222" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">大模型如何阅读文本？</text>

  <path d="M326 200 H404" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M396 188 L416 200 L396 212" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="430" y="126" width="212" height="148" rx="18" fill="#082f49" stroke="#0ea5e9" stroke-width="2"/>
  <text x="458" y="166" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Tokens</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#e0f2fe">
    <rect x="458" y="190" width="44" height="30" rx="8" fill="#0369a1"/><text x="470" y="211">大</text>
    <rect x="510" y="190" width="58" height="30" rx="8" fill="#0369a1"/><text x="522" y="211">模型</text>
    <rect x="576" y="190" width="44" height="30" rx="8" fill="#0369a1"/><text x="589" y="211">如何</text>
    <rect x="458" y="232" width="58" height="30" rx="8" fill="#0369a1"/><text x="469" y="253">阅读</text>
    <rect x="524" y="232" width="58" height="30" rx="8" fill="#0369a1"/><text x="535" y="253">文本</text>
    <rect x="590" y="232" width="30" height="30" rx="8" fill="#0369a1"/><text x="600" y="253">?</text>
  </g>

  <path d="M660 200 H738" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M730 188 L750 200 L730 212" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="764" y="140" width="148" height="120" rx="18" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="792" y="186" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Token IDs</text>
  <text x="792" y="222" fill="#c7d2fe" font-family="Inter, Arial, sans-serif" font-size="17">[51, 892,</text>
  <text x="792" y="246" fill="#c7d2fe" font-family="Inter, Arial, sans-serif" font-size="17"> 307, ...]</text>

  <rect x="118" y="318" width="724" height="46" rx="14" fill="#111827" stroke="#334155"/>
  <text x="150" y="347" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="17">Token count affects context length, cost, latency, and truncation.</text>
</svg>
